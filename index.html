<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>地理測驗基地</title>
<style>
:root{
  --bg:#eef1f5; --panel:#ffffff; --line:#d8dde5;
  --ink:#2b3340; --ink-dim:#8791a0;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:"Microsoft JhengHei","Noto Sans TC","PingFang TC",system-ui,sans-serif;
  background:var(--bg); color:var(--ink); min-height:100vh;
  display:flex; flex-direction:column; align-items:center;
  padding:clamp(24px,6vh,64px) 16px 40px;
}
h1{font-size:clamp(26px,5vw,40px);font-weight:900;letter-spacing:.12em;text-align:center}
.sub{color:var(--ink-dim);font-size:13px;letter-spacing:.35em;margin-top:8px;text-align:center}
#grid{
  margin-top:clamp(24px,5vh,44px);
  display:grid; gap:16px; width:min(880px,100%);
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
}
.qcard{
  display:block; text-decoration:none; color:inherit;
  background:var(--panel); border:1.5px solid var(--line); border-radius:16px;
  padding:16px 20px 14px; position:relative; overflow:hidden;
  transition:transform .15s, box-shadow .15s, border-color .15s;
}
.qcard::before{
  content:""; position:absolute; left:0; top:0; bottom:0; width:6px;
  background:var(--ac);
}
.qcard:hover,.qcard:focus-visible{
  transform:translateY(-3px);
  box-shadow:0 8px 24px rgba(40,55,80,.13);
  border-color:var(--ac);
  outline:none;
}
.qcard:focus-visible{box-shadow:0 0 0 3px var(--ac)}
.qcard .head{display:flex;align-items:center;gap:12px}
img.flag{width:38px;height:38px;flex:0 0 auto;display:block}
span.flag{font-size:30px;line-height:1;flex:0 0 auto}
.qcard h2{font-size:19px;font-weight:900;letter-spacing:.04em}
.qcard .en{font-size:11.5px;color:var(--ink-dim);letter-spacing:.12em;text-transform:uppercase;margin-top:2px}
.qcard .desc{font-size:13px;color:#5a6474;margin-top:10px;line-height:1.65}
.qcard .go{
  margin-top:10px; font-size:13px; font-weight:700; color:var(--ac);
}
footer{margin-top:auto;padding-top:48px;color:var(--ink-dim);font-size:12px;letter-spacing:.15em}
</style>
</head>
<body>
<h1>🌍 地理測驗基地</h1>
<p class="sub">INTERACTIVE&nbsp;GEOGRAPHY&nbsp;QUIZZES</p>

<div id="grid"></div>

<footer>新測驗持續增加中</footer>

<script>
/* 新增測驗：在這裡加一筆即可，卡片會自動產生 */
const QUIZZES=[
  {file:"taiwan",    flag:"🇹🇼", title:"台灣行政區",     en:"Taiwan Districts",
   ac:"#2e8b57", desc:"全台鄉鎮市區地圖測驗，可依縣市分區練習。"},
  {file:"japan",     flag:"🇯🇵", title:"日本都道府縣",   en:"Prefectures of Japan",
   ac:"#c0392b", desc:"47 個都道府縣，含地圖點選、選擇題與複習模式。"},
  {file:"vietnam",   flag:"🇻🇳", title:"越南省級行政區", en:"Provinces of Vietnam",
   ac:"#c8102e", desc:"2025 年併省後的 34 個省與直轄市，依北中南三區練習，附越南文名稱。"},
  {file:"russia",    flag:"🇷🇺", title:"俄羅斯聯邦主體", en:"Federal Subjects of Russia",
   ac:"#2b5f9e", desc:"83 個聯邦主體，依 8 大聯邦管區分區挑戰，附俄英名稱。"},
  {file:"caribbean", flag:"🏝️", title:"加勒比海地區",   en:"The Caribbean",
   ac:"#1a9e9e", desc:"島嶼與國家測驗，小島以引導線標示，考驗眼力。"},
  {file:"france",    flag:"🇫🇷", title:"法國省份",       en:"Départements de France",
   ac:"#1f3a93", desc:"96 個本土省依 13 大區分區，含 5 海外大區與海外集體彩蛋關。"},
  {file:"usa",       flag:"🇺🇸", title:"美國五十州",     en:"States of the U.S.A.",
   ac:"#3c3b6e", desc:"50 州地圖測驗，可加選華盛頓特區與 5 海外領地彩蛋關。"},
];
const grid=document.getElementById("grid");
/* Windows 不支援彩色國旗 emoji,改用 Twemoji SVG;載入失敗時退回原 emoji */
function flagEl(emoji){
  const cp=[...emoji].map(c=>c.codePointAt(0))
    .filter(c=>c!==0xfe0f).map(c=>c.toString(16)).join("-");
  const img=document.createElement("img");
  img.className="flag"; img.alt=emoji; img.loading="lazy";
  img.src=`https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/${cp}.svg`;
  img.onerror=()=>{
    const sp=document.createElement("span");
    sp.className="flag"; sp.textContent=emoji;
    img.replaceWith(sp);
  };
  return img;
}
QUIZZES.forEach(q=>{
  const a=document.createElement("a");
  a.className="qcard";
  a.href=q.file;
  a.style.setProperty("--ac",q.ac);
  const head=document.createElement("div");
  head.className="head";
  head.appendChild(flagEl(q.flag));
  const tt=document.createElement("div");
  tt.innerHTML=`<h2>${q.title}</h2><div class="en">${q.en}</div>`;
  head.appendChild(tt);
  a.appendChild(head);
  a.insertAdjacentHTML("beforeend",
    `<div class="desc">${q.desc}</div><div class="go">開始挑戰 →</div>`);
  grid.appendChild(a);
});
</script>
</body>
</html>
