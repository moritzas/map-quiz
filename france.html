<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>法國省份測驗</title>
<style>
:root{
  --bg:#f0f1f4; --panel:#ffffff; --line:#ddd;
  --ink:#333; --ink-dim:#888;
  --accent:#1f3a93; --red:#c0392b; --blue:#2980b9;
  --good:#4caf7d; --mid:#e8ad13; --bad:#e05a55;
  --land:#dbe3f0; --land-line:#7b8fb0; --land-hover:#b9c9e8;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:"Microsoft JhengHei","Noto Sans TC","PingFang TC",system-ui,sans-serif;
  background:var(--bg); color:var(--ink); overflow:hidden; touch-action:manipulation;
}
#app{height:100%;display:flex;flex-direction:column;max-width:1000px;margin:0 auto;padding:10px 12px}

/* ---------- start screen ---------- */
.screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;overflow:auto}
h1{font-size:clamp(22px,4.5vw,34px);font-weight:900;letter-spacing:.1em;color:#222}
h1 span{color:var(--accent)}
.sub{color:var(--ink-dim);font-size:13px;letter-spacing:.3em;margin-top:6px}
.card{background:var(--panel);border:1.5px solid var(--line);border-radius:14px;padding:14px 18px;width:min(480px,94vw);transition:.2s}
.card.wide{width:min(660px,94vw)}
.card h3{font-size:12px;color:var(--ink-dim);letter-spacing:.3em;margin-bottom:10px;font-weight:700}
.card.dis{opacity:.35;pointer-events:none}
.optrow{display:flex;gap:7px;flex-wrap:wrap;justify-content:center}
.opt{flex:1;min-width:96px;padding:10px 6px;border-radius:10px;border:1.5px solid var(--line);
  background:#fafafa;color:var(--ink);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s}
.opt.sm{min-width:104px;font-size:13px;padding:8px 5px;flex:0 1 auto}
.opt small{display:block;font-weight:400;color:var(--ink-dim);font-size:11px;margin-top:2px}
.opt.sel{border-color:var(--accent);background:#eef1fb;color:var(--accent)}
.opt.sel small{color:#5a6cb0}
.opt:not(:disabled):hover{border-color:var(--accent)}
.opt:disabled{opacity:.35;cursor:default}
.bigbtn{padding:13px 56px;font-size:17px;font-weight:900;letter-spacing:.3em;border:none;border-radius:999px;cursor:pointer;
  background:var(--accent);color:#fff;font-family:inherit;box-shadow:0 4px 16px rgba(31,58,147,.3)}
.bigbtn:active{transform:scale(.97)}

/* ---------- game layout ---------- */
#game{flex:1;display:none;flex-direction:column;gap:8px;min-height:0}
#topbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
#prompt{flex:1;min-width:190px;background:var(--panel);border:1.5px solid var(--line);border-radius:12px;padding:9px 14px;display:flex;align-items:center;gap:9px;flex-wrap:wrap}
#prompt .q{font-size:13px;color:var(--ink-dim);white-space:nowrap}
#prompt .name{font-size:clamp(16px,3vw,21px);font-weight:900;letter-spacing:.05em;color:var(--accent)}
#prompt .fr{font-size:12px;color:var(--ink-dim);font-style:italic}
.badge{font-size:11px;padding:3px 9px;border-radius:999px;font-weight:700;white-space:nowrap;border:1px solid}
#stats{display:flex;align-items:center;gap:9px;background:var(--panel);border:1.5px solid var(--line);border-radius:12px;padding:9px 13px;font-size:13px;font-weight:700}
#stats .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:3px}
#hintbtn{padding:9px 15px;border-radius:12px;border:1.5px solid #27ae60;background:#eafaf1;color:#1e8449;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit}
#hintbtn:disabled{opacity:.35;cursor:default}
#quitbtn{padding:9px 13px;border-radius:12px;border:1.5px solid var(--line);background:var(--panel);color:var(--ink-dim);font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;white-space:nowrap}
#quitbtn.arm{border-color:var(--bad);color:var(--red);background:#fdedec}

#mapwrap{flex:1;position:relative;min-height:0;border-radius:14px;overflow:hidden;border:1.5px solid var(--line);background:var(--panel)}
svg{width:100%;height:100%;display:block;cursor:grab;touch-action:none}
svg.grabbing{cursor:grabbing}
.isl{cursor:pointer}
.isl .shape{fill:var(--land);stroke:var(--land-line);stroke-width:.8;vector-effect:non-scaling-stroke;transition:fill .12s}
.isl:hover .shape{fill:var(--land-hover)}
.isl .hit{fill:rgba(255,255,255,0);stroke:#b9c4d4;stroke-width:1.2;vector-effect:non-scaling-stroke;transition:fill .12s}
.isl:hover .hit{fill:rgba(31,58,147,.07);stroke:#8fa0c8}
svg text{pointer-events:none}
.res-g .shape{fill:#8fce8f!important}.res-y .shape{fill:#f2c14e!important}.res-r .shape{fill:#e88080!important}
.res-g .hit{fill:rgba(143,206,143,.22)!important;stroke:#5aa86a!important}
.res-y .hit{fill:rgba(242,193,78,.22)!important;stroke:#c99b2e!important}
.res-r .hit{fill:rgba(232,128,128,.22)!important;stroke:#c46060!important}
.flashwrong .shape{fill:#e88080!important}
.flashwrong .hit{fill:rgba(232,128,128,.3)!important}
.target{animation:pulse 1s ease-in-out infinite}
.target .shape{fill:#ffd54f!important}
.target .hit{fill:rgba(255,213,79,.35)!important;stroke:#d4a017!important}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
@media (prefers-reduced-motion: reduce){.target{animation:none}}
.grp-0 .shape{fill:#aecbea}
.grp-1 .shape{fill:#f2a6a0}
.grp-2 .shape{fill:#a9dcae}
.grp-3 .shape{fill:#f6c885}
.grp-4 .shape{fill:#cbb3e6}
.grp-5 .shape{fill:#f4e58a}
.grp-6 .shape{fill:#9fd8d8}
.grp-7 .shape{fill:#f0b8d0}
.grp-8 .shape{fill:#c9d6a3}
.grp-9 .shape{fill:#f3b58e}
.grp-10 .shape{fill:#b3c7f0}
.grp-11 .shape{fill:#ffd9a0}
.grp-12 .shape{fill:#d4a9e8}
.grp-13 .shape{fill:#a3e0c8}
.grp-14 .shape{fill:#e6d3b3}
.sep{stroke:#b9c4d4;stroke-width:1;stroke-dasharray:4 3;vector-effect:non-scaling-stroke;pointer-events:none}
.lbl-bg{fill:rgba(255,255,255,.9);stroke:#ccc;stroke-width:.5}
.lbl-tx{font-size:11.5px;font-weight:400;fill:#222;text-anchor:middle;dominant-baseline:middle;
  font-family:"Microsoft JhengHei","Noto Sans TC",sans-serif}

#zoomctl{position:absolute;right:10px;top:10px;display:flex;flex-direction:column;gap:5px}
#zoomctl button{width:36px;height:36px;border-radius:9px;border:1px solid var(--line);background:rgba(255,255,255,.94);color:var(--ink);font-size:18px;cursor:pointer;font-family:inherit;box-shadow:0 1px 3px rgba(0,0,0,.1)}
#zoomctl button:hover{background:#fff;border-color:var(--blue)}
#labelbtn{position:absolute;left:10px;top:10px;display:none;padding:6px 12px;border-radius:9px;border:1.5px solid var(--blue);
  background:rgba(255,255,255,.94);color:#1a5276;font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit}
#labelbtn.on{background:var(--blue);color:#fff}
#edgepan{display:none}
#edgepan.show{display:block}
#edgepan button{position:absolute;border-radius:9px;border:1px solid var(--line);
  background:rgba(255,255,255,.65);color:#777;font-size:13px;cursor:pointer;
  font-family:inherit;z-index:3;touch-action:none}
#edgepan button:hover{background:#eef1fb;color:var(--accent);border-color:var(--accent)}
#regions{position:absolute;left:10px;right:56px;bottom:10px;display:flex;gap:5px;overflow-x:auto;
  scrollbar-width:thin;padding-bottom:2px;-webkit-overflow-scrolling:touch}
#regions button{padding:5px 10px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.94);color:#666;font-size:12px;cursor:pointer;font-family:inherit;font-weight:700;white-space:nowrap;flex:0 0 auto}
#regions button:hover{color:var(--accent);border-color:var(--accent)}

#toast{position:absolute;top:12px;left:50%;transform:translateX(-50%) translateY(-8px);background:rgba(255,255,255,.97);
  border:1.5px solid var(--line);border-radius:999px;padding:8px 20px;font-weight:900;font-size:15px;
  opacity:0;transition:.25s;pointer-events:none;white-space:nowrap;z-index:5;box-shadow:0 2px 10px rgba(0,0,0,.1)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{color:#1e8449}#toast.no{color:var(--red)}#toast.info{color:var(--blue)}

#choices{display:none;grid-template-columns:1fr 1fr;gap:8px}
#choices button{padding:10px 10px;border-radius:11px;border:1.5px solid var(--line);background:var(--panel);
  color:var(--ink);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:.12s}
#choices button small{display:block;font-weight:400;color:var(--ink-dim);font-size:11px;font-style:italic;margin-top:2px}
#choices button:not(:disabled):hover{border-color:var(--accent)}
#choices button.c-ok{border-color:#27ae60;background:#eafaf1;color:#1e8449}
#choices button.c-no{border-color:var(--red);background:#fdedec;color:var(--red);opacity:.75}
#choices button:disabled{cursor:default}

#infocard{position:absolute;left:50%;bottom:52px;transform:translateX(-50%);background:rgba(255,255,255,.97);
  border:1.5px solid var(--line);border-radius:12px;padding:11px 20px;text-align:center;display:none;z-index:4;min-width:210px;box-shadow:0 3px 14px rgba(0,0,0,.12)}
#infocard .name{font-size:18px;font-weight:900;margin-bottom:2px}
#infocard .fr{font-size:12.5px;color:var(--ink-dim);font-style:italic;margin-bottom:6px}
#infocard .num{display:inline-block;font-size:11px;font-weight:700;color:#fff;background:var(--accent);border-radius:6px;padding:1px 7px;margin-bottom:5px}
#legend{position:absolute;right:10px;bottom:44px;background:rgba(255,255,255,.96);border:1px solid var(--line);
  border-radius:11px;display:none;font-size:11.5px;line-height:1.8;max-height:56%;overflow:auto;box-shadow:0 2px 10px rgba(0,0,0,.08)}
#legend .lg-head{position:sticky;top:0;background:rgba(255,255,255,.97);font-weight:700;font-size:11px;color:var(--ink-dim);
  letter-spacing:.08em;padding:7px 12px;cursor:pointer;border-bottom:1px solid var(--line);user-select:none;white-space:nowrap}
#legend.closed .lg-head{border-bottom:none}
#legend .lg-body{padding:5px 6px}
#legend.closed .lg-body{display:none}
#legend .lg-row{padding:1px 7px;cursor:pointer;border-radius:6px;white-space:nowrap}
#legend .lg-row:hover{background:#eef1fb;color:var(--accent)}
#legend i{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:6px;vertical-align:-1px;border:1px solid rgba(0,0,0,.12)}

/* ---------- results ---------- */
#result{display:none;flex-direction:column;gap:10px;flex:1;min-height:0;overflow:auto}
#result .board{background:var(--panel);border:1.5px solid var(--line);border-radius:14px;padding:15px;text-align:center}
#result .score{font-size:clamp(28px,6vw,42px);font-weight:900;color:var(--accent)}
#result .breakdown{display:flex;justify-content:center;gap:20px;margin-top:6px;font-weight:700;font-size:15px}
#mistakes{font-size:13.5px;color:var(--ink-dim);line-height:2;text-align:center;margin-top:4px}
#mistakes b{color:#922b21}
.btnrow{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.ghost{padding:10px 24px;border-radius:999px;border:1.5px solid #bbb;background:transparent;color:var(--ink);font-weight:700;font-size:15px;cursor:pointer;font-family:inherit}
.ghost:hover{border-color:var(--accent);color:var(--accent)}
@media (max-width:560px){
  #app{padding:8px}
  #prompt{padding:8px 12px}
}
</style>
</head>
<body>
<div id="app">

  <!-- start -->
  <div class="screen" id="start">
    <div>
      <h1>🇫🇷 法國 <span>省份測驗</span></h1>
      <p class="sub">DÉPARTEMENTS&nbsp;DE&nbsp;FRANCE</p>
    </div>
    <div class="card">
      <h3>測驗模式</h3>
      <div class="optrow" id="modeRow">
        <button class="opt sel" data-mode="click">🗺️ 地圖點選<small>依名稱點出位置</small></button>
        <button class="opt" data-mode="mc">📝 選擇題<small>看位置選出名稱</small></button>
        <button class="opt" data-mode="review">📖 複習模式<small>自由瀏覽各省</small></button>
      </div>
    </div>
    <div class="card wide" id="rangeCard">
      <h3>測驗範圍（13 大區＋海外）</h3>
      <div class="optrow" id="rangeRow"></div>
    </div>
    <div class="card" id="countCard">
      <h3>測驗題數</h3>
      <div class="optrow" id="countRow">
        <button class="opt" data-count="10">10 題</button>
        <button class="opt" data-count="20">20 題</button>
        <button class="opt" data-count="40">40 題</button>
        <button class="opt sel" data-count="0">全部<small id="cntAll"></small></button>
      </div>
    </div>
    <button class="bigbtn" id="startBtn">開始</button>
  </div>

  <!-- game -->
  <div id="game">
    <div id="topbar">
      <div id="prompt"></div>
      <div id="stats"></div>
      <button id="hintbtn">💡 提示</button>
      <button id="quitbtn">✕ 離開</button>
    </div>
    <div id="mapwrap">
      <svg id="map" xmlns="http://www.w3.org/2000/svg"></svg>
      <button id="labelbtn">🗺 顯示地名</button>
      <div id="zoomctl">
        <button id="zin">＋</button><button id="zout">－</button><button id="zfit">⛶</button>
      </div>
      <div id="edgepan">
        <button data-dir="up" style="top:8px;left:50%;transform:translateX(-50%);width:34%;height:30px">▲</button>
        <button data-dir="down" style="bottom:8px;left:50%;transform:translateX(-50%);width:34%;height:30px">▼</button>
        <button data-dir="left" style="left:8px;top:50%;transform:translateY(-50%);height:34%;width:30px">◀</button>
        <button data-dir="right" style="right:8px;top:50%;transform:translateY(-50%);height:34%;width:30px">▶</button>
      </div>
      <div id="regions"></div>
      <div id="toast"></div>
      <div id="infocard"></div>
      <div id="legend"></div>
    </div>
    <div id="choices"></div>
  </div>

  <!-- result -->
  <div id="result">
    <div class="board">
      <div style="font-size:13px;letter-spacing:.3em;color:var(--ink-dim);font-weight:700">測驗結果</div>
      <div class="score" id="scoreTxt"></div>
      <div class="breakdown" id="breakTxt"></div>
      <div id="mistakes"></div>
    </div>
    <div id="mapwrap2" style="flex:1;position:relative;min-height:220px;border-radius:14px;overflow:hidden;border:1.5px solid var(--line);background:var(--panel)"></div>
    <div class="btnrow">
      <button class="bigbtn" id="againBtn" style="padding:11px 36px">再玩一次</button>
      <button class="ghost" id="homeBtn">回主選單</button>
    </div>
  </div>
</div>

/* ---------- svg build ---------- */
const svgNS="http://www.w3.org/2000/svg";
const mapEl=document.getElementById("map");
let vb={x:0,y:0,w:MAP_W,h:MAP_H};
const MINW=MAP_W/60, MAXW=MAP_W*1.12;

function el(tag,attrs,parent){
  const n=document.createElementNS(svgNS,tag);
  for(const k in attrs) n.setAttribute(k,attrs[k]);
  if(parent) parent.appendChild(n);
  return n;
}
function buildMap(svgTarget){
  svgTarget.innerHTML="";
  svgTarget.setAttribute("viewBox",`0 0 ${MAP_W} ${MAP_H}`);
  svgTarget.setAttribute("preserveAspectRatio","xMidYMid meet");
  const g=el("g",{},svgTarget);
  const paths={};
  DEPTS.forEach(o=>{
    const grp=el("g",{class:"isl","data-c":o.c},g);
    const b=BOXES[o.c];
    if(b) el("rect",{x:b[0],y:b[1],width:b[2],height:b[3],rx:8,class:"hit"},grp);
    el("path",{d:o.d,class:"shape"},grp);
    paths[o.c]=grp;
  });
  DECOR.forEach(L=> el("line",{x1:L[0],y1:L[1],x2:L[2],y2:L[3],class:"sep"},g));
  return {g,paths};
}
const main=buildMap(mapEl);

function applyVB(){
  mapEl.setAttribute("viewBox",`${vb.x} ${vb.y} ${vb.w} ${vb.h}`);
  document.getElementById("edgepan").classList.toggle("show", vb.w<MAP_W*0.92);
  updateLabelScale();
}
function clampVB(){
  vb.w=Math.min(Math.max(vb.w,MINW),MAXW);
  vb.h=vb.w*MAP_H/MAP_W;
  const mX=vb.w*0.35, mY=vb.h*0.35;
  vb.x=Math.min(Math.max(vb.x,-mX),MAP_W-vb.w+mX);
  vb.y=Math.min(Math.max(vb.y,-mY),MAP_H-vb.h+mY);
}
function screenScale(){
  const r=mapEl.getBoundingClientRect();
  return Math.min(r.width/vb.w,r.height/vb.h);
}
function clientToSvg(cx,cy){
  const r=mapEl.getBoundingClientRect();
  const s=screenScale();
  const ox=(r.width-vb.w*s)/2, oy=(r.height-vb.h*s)/2;
  return [vb.x+(cx-r.left-ox)/s, vb.y+(cy-r.top-oy)/s];
}
function zoomAt(cx,cy,factor){
  const [sx,sy]=clientToSvg(cx,cy);
  const nw=Math.min(Math.max(vb.w/factor,MINW),MAXW);
  const f=vb.w/nw;
  vb.x=sx-(sx-vb.x)/f; vb.y=sy-(sy-vb.y)/f;
  vb.w=nw; clampVB(); applyVB();
}
function fitBBox(b,padFrac){
  const pad=Math.max(b[2]-b[0],b[3]-b[1])*(padFrac==null?0.25:padFrac)+4;
  let x0=b[0]-pad,y0=b[1]-pad,x1=b[2]+pad,y1=b[3]+pad;
  let w=x1-x0,h=y1-y0;
  if(w/h>MAP_W/MAP_H){h=w*MAP_H/MAP_W;}else{w=h*MAP_W/MAP_H;}
  vb.x=(x0+x1)/2-w/2; vb.y=(y0+y1)/2-h/2; vb.w=w; vb.h=h;
  clampVB(); applyVB();
}
function fitAll(){ vb={x:0,y:0,w:MAP_W,h:MAP_H}; applyVB(); }
function unionMB(cs){
  let b=[1e9,1e9,-1e9,-1e9];
  cs.forEach(c=>{const o=byC[c];
    b[0]=Math.min(b[0],o.mb[0]); b[1]=Math.min(b[1],o.mb[1]);
    b[2]=Math.max(b[2],o.mb[2]); b[3]=Math.max(b[3],o.mb[3]);});
  return b;
}

/* ---------- pan / pinch / tap ---------- */
const ptrs=new Map();
let panStart=null,pinchStart=null,movedDist=0,downTarget=null;
mapEl.addEventListener("pointerdown",e=>{
  mapEl.setPointerCapture(e.pointerId);
  ptrs.set(e.pointerId,[e.clientX,e.clientY]);
  movedDist=0; downTarget=e.target;
  if(ptrs.size===1){
    panStart={cx:e.clientX,cy:e.clientY,vx:vb.x,vy:vb.y};
    mapEl.classList.add("grabbing");
  } else if(ptrs.size===2){
    panStart=null;
    const p=[...ptrs.values()];
    pinchStart={d:Math.hypot(p[0][0]-p[1][0],p[0][1]-p[1][1]),w:vb.w};
  }
});
mapEl.addEventListener("pointermove",e=>{
  if(!ptrs.has(e.pointerId)) return;
  ptrs.set(e.pointerId,[e.clientX,e.clientY]);
  if(ptrs.size===1&&panStart){
    const s=screenScale();
    const dx=e.clientX-panStart.cx, dy=e.clientY-panStart.cy;
    movedDist=Math.max(movedDist,Math.hypot(dx,dy));
    vb.x=panStart.vx-dx/s; vb.y=panStart.vy-dy/s;
    clampVB(); applyVB();
  } else if(ptrs.size===2&&pinchStart){
    movedDist=99;
    const p=[...ptrs.values()];
    const d=Math.hypot(p[0][0]-p[1][0],p[0][1]-p[1][1]);
    const mid=[(p[0][0]+p[1][0])/2,(p[0][1]+p[1][1])/2];
    const [sx,sy]=clientToSvg(mid[0],mid[1]);
    const nw=Math.min(Math.max(pinchStart.w*pinchStart.d/Math.max(d,20),MINW),MAXW);
    const f=vb.w/nw;
    vb.x=sx-(sx-vb.x)/f; vb.y=sy-(sy-vb.y)/f; vb.w=nw;
    clampVB(); applyVB();
  }
});
function endPtr(e){
  ptrs.delete(e.pointerId);
  if(ptrs.size===0){panStart=null;pinchStart=null;mapEl.classList.remove("grabbing");}
  else if(ptrs.size===1){pinchStart=null;
    const p=[...ptrs.entries()][0];
    panStart={cx:p[1][0],cy:p[1][1],vx:vb.x,vy:vb.y};
  }
}
mapEl.addEventListener("pointerup",e=>{
  const tgt=downTarget;
  const wasTap=movedDist<7&&ptrs.size===1;
  endPtr(e);
  if(wasTap&&tgt&&tgt.closest){
    const grp=tgt.closest("[data-c]");
    if(grp) handleDeptTap(grp.dataset.c);
  }
});
mapEl.addEventListener("pointercancel",endPtr);
mapEl.addEventListener("wheel",e=>{
  e.preventDefault();
  zoomAt(e.clientX,e.clientY,e.deltaY<0?1.22:1/1.22);
},{passive:false});
document.getElementById("zin").onclick=()=>{const r=mapEl.getBoundingClientRect();zoomAt(r.left+r.width/2,r.top+r.height/2,1.5);};
document.getElementById("zout").onclick=()=>{const r=mapEl.getBoundingClientRect();zoomAt(r.left+r.width/2,r.top+r.height/2,1/1.5);};
document.getElementById("zfit").onclick=fitAll;
function panBy(dx,dy){vb.x+=dx*vb.w*0.22;vb.y+=dy*vb.h*0.22;clampVB();applyVB();}
const DIRV={up:[0,-1],down:[0,1],left:[-1,0],right:[1,0]};
document.querySelectorAll("#edgepan button").forEach(b=>{
  let rep=null;
  const stop=()=>{clearInterval(rep);rep=null;};
  b.addEventListener("pointerdown",e=>{
    e.preventDefault();e.stopPropagation();
    const v=DIRV[b.dataset.dir];
    panBy(v[0],v[1]);
    stop(); rep=setInterval(()=>panBy(v[0],v[1]),260);
  });
  ["pointerup","pointercancel","pointerleave"].forEach(ev=>b.addEventListener(ev,stop));
});
document.addEventListener("keydown",e=>{
  if(e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA")return;
  const km={ArrowUp:"up",ArrowDown:"down",ArrowLeft:"left",ArrowRight:"right"};
  if(km[e.key]&&$("game").style.display!=="none"){
    e.preventDefault();
    const v=DIRV[km[e.key]];panBy(v[0],v[1]);
  }
});

}
document.querySelectorAll("#countRow .opt").forEach(b=>b.onclick=()=>{
  if(b.disabled)return;
  document.querySelectorAll("#countRow .opt").forEach(x=>x.classList.remove("sel"));
  b.classList.add("sel"); countSel=parseInt(b.dataset.count);
});
document.querySelectorAll("#modeRow .opt").forEach(b=>b.onclick=()=>{
  document.querySelectorAll("#modeRow .opt").forEach(x=>x.classList.remove("sel"));
  b.classList.add("sel"); mode=b.dataset.mode;
  const rev=mode==="review";
  $("rangeCard").classList.toggle("dis",rev);
  $("countCard").classList.toggle("dis",rev);
});
refreshCounts();

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

let toastTimer=null;
function toast(msg,cls,ms){
  const t=$("toast");
  t.textContent=msg;t.className="show "+cls;
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.className="",ms||1300);
}

function setDeptClass(c,cls){ main.paths[c].classList.add(cls); }
function clearDeptStates(){
  DEPTS.forEach(o=>main.paths[o.c].setAttribute("class","isl"));
}
function badge(r){
  const col=GCOL[r];
  return `<span class="badge" style="background:${col}40;color:#3b4252;border-color:${col}">${RSHORT[r]}</span>`;
}

/* ---------- labels (review) ---------- */
let labelsOn=false, labelGroups=[];
const LBL_FS=11.5, LBL_CAP_PX=16;
function setLabels(on){
  labelsOn=on;
  const btn=$("labelbtn");
  btn.classList.toggle("on",on);
  btn.textContent=on?"🗺 隱藏地名":"🗺 顯示地名";
  const old=mapEl.querySelector("#alllabels");
  if(old) old.remove();
  labelGroups=[];
  if(!on) return;
  const lg=el("g",{id:"alllabels"},mapEl.firstChild?mapEl:mapEl);
  DEPTS.forEach(o=>{
    const cx=(o.mb[0]+o.mb[2])/2, cy=(o.mb[1]+o.mb[3])/2;
    const grp=el("g",{},lg);
    const t=el("text",{x:0,y:0,class:"lbl-tx"},grp);
    t.textContent=o.n;
    const bb=t.getBBox();
    const r=el("rect",{x:bb.x-3,y:bb.y-1.5,width:bb.width+6,height:bb.height+3,rx:2,class:"lbl-bg"},grp);
    grp.insertBefore(r,t);
    labelGroups.push({grp,cx,cy});
  });
  updateLabelScale();
}
function updateLabelScale(){
  if(!labelsOn||!labelGroups.length) return;
  const s=screenScale();
  if(!isFinite(s)||s<=0) return;
  const q=Math.min(1, LBL_CAP_PX/(LBL_FS*s));
  labelGroups.forEach(L=>L.grp.setAttribute("transform",
    `translate(${L.cx},${L.cy}) scale(${q})`));
}
window.addEventListener("resize",updateLabelScale);
$("labelbtn").onclick=()=>setLabels(!labelsOn);

/* ---------- flow ---------- */
function startGame(){
  $("start").style.display="none";
  $("result").style.display="none";
  $("game").style.display="flex";
  clearDeptStates(); fitAll(); setLabels(false);
  $("infocard").style.display="none";
  $("legend").style.display="none";
  $("choices").style.display="none";
  $("labelbtn").style.display="none";
  session++; disarmQuit();
  results={}; idx=0;
  if(mode==="review"){ setupReview(); return; }
  const p=poolFor(range);
  pool=shuffle(p.slice());
  if(countSel>0) pool=pool.slice(0,Math.min(countSel,pool.length));
  ctxBB = range==="all" ? null : unionMB(poolFor(range).map(o=>o.c));
  $("hintbtn").style.display=mode==="click"?"":"none";
  $("choices").style.display=mode==="mc"?"grid":"none";
  if(ctxBB&&mode==="click") fitBBox(ctxBB,0.12);
  nextQuestion();
}
$("startBtn").onclick=startGame;
$("againBtn").onclick=startGame;
function goHome(){
  session++; disarmQuit();
  $("result").style.display="none";$("game").style.display="none";$("start").style.display="flex";
  $("toast").className="";
  clearDeptStates(); fitAll(); setLabels(false);
}
$("homeBtn").onclick=goHome;
let quitTimer=null;
function disarmQuit(){clearTimeout(quitTimer);quitTimer=null;const q=$("quitbtn");q.textContent="✕ 離開";q.classList.remove("arm");}
$("quitbtn").onclick=()=>{
  if(mode==="review"||quitTimer){goHome();return;}
  const q=$("quitbtn");
  q.textContent="確定離開？";q.classList.add("arm");
  quitTimer=setTimeout(disarmQuit,2500);
};

function updateStats(){
  const g=Object.values(results).filter(v=>v==="g").length;
  const y=Object.values(results).filter(v=>v==="y").length;
  const r=Object.values(results).filter(v=>v==="r").length;
  $("stats").innerHTML=`<span>第 ${Math.min(idx+1,pool.length)} / ${pool.length} 題</span>
    <span><span class="dot" style="background:#8fce8f"></span>${g}</span>
    <span><span class="dot" style="background:#f2c14e"></span>${y}</span>
    <span><span class="dot" style="background:#e88080"></span>${r}</span>`;
}

function nextQuestion(){
  if(idx>=pool.length){showResult();return;}
  attempts=0;usedHint=false;locked=false;
  $("hintbtn").disabled=false;
  const t=pool[idx];
  updateStats();
  if(mode==="click"){
    $("prompt").innerHTML=`<span class="q">請找出：</span><span class="name">${t.n}</span><span class="fr">${t.f}</span>${badge(t.r)}`;
  }else{
    $("prompt").innerHTML=`<span class="q">閃爍的省份／領地是？</span>`;
    document.querySelectorAll(".target").forEach(n=>n.classList.remove("target"));
    setDeptClass(t.c,"target");
    const diag=Math.hypot(t.mb[2]-t.mb[0],t.mb[3]-t.mb[1]);
    if(diag>380) fitAll(); else fitBBox(t.mb,Math.max(2.2,70/diag));
    buildChoices(t);
  }
}

/* ---------- click mode ---------- */
function flashResult(c,gr){
  setDeptClass(c,"res-"+gr);
  later(()=>main.paths[c].classList.remove("res-"+gr),2600);
}
function grade(){
  let g=attempts===0?"g":attempts===1?"y":"r";
  if(usedHint&&g==="g")g="y";
  return g;
}
function handleDeptTap(c){
  if(mode==="review"){showInfo(c);return;}
  if(mode!=="click"||locked)return;
  const t=pool[idx];
  if(c===t.c){
    locked=true;
    document.querySelectorAll(".target").forEach(n=>n.classList.remove("target"));
    const gr=grade();
    results[t.c]=gr;
    flashResult(t.c,gr);
    toast("✓ "+t.n,"ok");
    updateStats();
    idx++; later(nextQuestion,650);
  }else{
    attempts++;
    const w=main.paths[c];
    w.classList.add("flashwrong");
    setTimeout(()=>w.classList.remove("flashwrong"),450);
    if(attempts>=3){
      locked=true;
      results[t.c]="r";
      flashResult(t.c,"r");
      setDeptClass(t.c,"target");
      toast("正確位置：「"+t.n+"」在這裡","no",1700);
      fitBBox(t.mb,2.5);
      updateStats();
      later(()=>{main.paths[t.c].classList.remove("target");idx++;if(ctxBB)fitBBox(ctxBB,0.12);nextQuestion();},1800);
    }else{
      toast("那是「"+byC[c].n+"」，再試一次！","no");
    }
  }
}
$("hintbtn").onclick=()=>{
  if(mode!=="click"||locked)return;
  usedHint=true;$("hintbtn").disabled=true;
  const t=pool[idx];
  if(ctxBB) fitBBox(ctxBB,0.12);
  else fitBBox(t.mb,Math.max(6,200/Math.hypot(t.mb[2]-t.mb[0],t.mb[3]-t.mb[1])));
  setDeptClass(t.c,"target");
  toast("看到閃爍的位置了嗎？（用提示最高只算黃燈）","info",2200);
  later(()=>main.paths[t.c].classList.remove("target"),2600);
};

/* ---------- multiple choice ---------- */
function buildChoices(t){
  let src=poolFor(range);
  if(src.length<4) src=DEPTS;
  const others=src.filter(o=>o.c!==t.c);
  const [cx,cy]=mbc(t);
  others.sort((a,b)=>{
    const [ax,ay]=mbc(a),[bx,by]=mbc(b);
    return Math.hypot(ax-cx,ay-cy)-Math.hypot(bx-cx,by-cy);
  });
  const near=others.slice(0,Math.min(7,others.length));
  const opts=shuffle([t,...shuffle(near).slice(0,3)]);
  const box=$("choices");box.innerHTML="";
  opts.forEach(o=>{
    const b=document.createElement("button");
    b.innerHTML=`${o.n}&nbsp;${badge(o.r)}<small>${o.f}</small>`;
    b.onclick=()=>{
      if(locked)return;
      if(o.c===t.c){
        locked=true;
        b.classList.add("c-ok");
        const gr=attempts===0?"g":attempts===1?"y":"r";
        results[t.c]=gr;
        document.querySelectorAll(".target").forEach(n=>n.classList.remove("target"));
        flashResult(t.c,gr);
        toast("✓ "+t.n,"ok");
        updateStats();
        idx++; later(nextQuestion,850);
      }else{
        attempts++;
        b.classList.add("c-no");b.disabled=true;
        if(attempts>=3){
          locked=true;
          results[t.c]="r";
          document.querySelectorAll(".target").forEach(n=>n.classList.remove("target"));
          flashResult(t.c,"r");
          toast("正確答案：「"+t.n+"」","no",1500);
          updateStats();
          idx++; later(nextQuestion,1500);
        }else{
          toast("再試一次！","no");
        }
      }
    };
    box.appendChild(b);
  });
}

/* ---------- review mode ---------- */
function setupReview(){
  $("hintbtn").style.display="none";
  $("labelbtn").style.display="block";
  setLabels(true);
  $("prompt").innerHTML=`<span class="q">點選任一省份／領地查看名稱與編號</span>`;
  $("stats").innerHTML=`<span>96 省＋12 海外領地</span>`;
  DEPTS.forEach(o=>setDeptClass(o.c,"grp-"+o.r));
  const lg=$("legend");
  lg.innerHTML=`<div class="lg-head">大區圖例（點選聚焦）<span id="lgArrow">▾</span></div><div class="lg-body">`+
    REGION.map((name,ri)=>{
      const n=DEPTS.filter(o=>o.r===ri).length;
      return `<div class="lg-row" data-r="${ri}"><i style="background:${GCOL[ri]}"></i>${name}（${n}）</div>`;
    }).join("")+`</div>`;
  lg.classList.toggle("closed", window.innerWidth<=560);
  $("lgArrow").textContent=lg.classList.contains("closed")?"▸":"▾";
  lg.querySelector(".lg-head").onclick=()=>{
    lg.classList.toggle("closed");
    $("lgArrow").textContent=lg.classList.contains("closed")?"▸":"▾";
  };
  lg.querySelectorAll(".lg-row").forEach(el=>{
    el.onclick=()=>{
      const ri=parseInt(el.dataset.r);
      fitBBox(unionMB(DEPTS.filter(o=>o.r===ri).map(o=>o.c)),0.08);
    };
  });
  lg.style.display="block";
}
function showInfo(c){
  const o=byC[c];
  const card=$("infocard");
  const tag=o.r===14?"海外集體":o.r===13?"海外大區・省":"省編號";
  card.innerHTML=`<div class="num">${tag} ${o.c}</div><div class="name">${o.n}</div><div class="fr">${o.f}</div>${badge(o.r)}`;
  card.style.display="block";
  document.querySelectorAll(".target").forEach(n=>n.classList.remove("target"));
  setDeptClass(c,"target");
  later(()=>main.paths[c].classList.remove("target"),2000);
}

/* ---------- results ---------- */
function showResult(){
  $("game").style.display="none";
  $("result").style.display="flex";
  const g=Object.values(results).filter(v=>v==="g").length;
  const y=Object.values(results).filter(v=>v==="y").length;
  const r=Object.values(results).filter(v=>v==="r").length;
  const pct=Math.round((g+y*0.5)/pool.length*100);
  $("scoreTxt").textContent=pct+" 分";
  $("breakTxt").innerHTML=`<span style="color:#1e8449">一次答對 ${g}</span>
    <span style="color:#b8860b">兩次內 ${y}</span>
    <span style="color:#c0392b">未答對 ${r}</span>`;
  const wrong=pool.filter(o=>results[o.c]!=="g");
  $("mistakes").innerHTML=wrong.length
    ?"需要複習："+wrong.map(o=>`<b>${o.n}</b>`).join("、")
    :"全部一次答對，太厲害了！🇫🇷";
  const wrap=$("mapwrap2");wrap.innerHTML="";
  const rsvg=document.createElementNS(svgNS,"svg");
  rsvg.setAttribute("style","width:100%;height:100%;display:block;cursor:default");
  rsvg.setAttribute("viewBox",`0 0 ${MAP_W} ${MAP_H}`);
  wrap.appendChild(rsvg);
  const m=buildMap(rsvg);
  pool.forEach(o=>{
    m.paths[o.c].classList.add("res-"+(results[o.c]||"r"));
    m.paths[o.c].style.cursor="default";
  });
  DEPTS.filter(o=>!pool.includes(o)).forEach(o=>{
    m.paths[o.c].style.opacity=.3;
    m.paths[o.c].style.cursor="default";
  });
}

fitAll();
</script>
